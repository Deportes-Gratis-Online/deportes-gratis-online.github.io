<style>
/* ── VARIABLES Y FONDO ORIGINALES ── */
:root {
  --green-dark: #064e3b;
  --gold: #facc15;
  --red: #dc2626;
  --red-dark: #b91c1c;
  --white: #ffffff;
  --black: #000000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--green-dark);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at top left, rgba(5,150,105,.18) 0%, transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(6,78,59,.4) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── NAVEGACIÓN SUPERIOR ── */
.top-nav {
  position: relative;
  z-index: 10;
  padding: 20px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid rgba(250,204,21,.15);
  background: rgba(0,0,0,0.2);
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--gold);
  text-decoration: none;
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  transition: color .25s;
}
.back-btn:hover { color: var(--white); }
.back-btn svg { width: 18px; height: 18px; fill: currentColor; }

/* ── CONTENEDOR PRINCIPAL DEL PARTIDO ── */
.match-container {
  position: relative;
  z-index: 10;
  max-width: 800px;
  margin: 30px auto;
  padding: 0 16px;
  text-align: center;
}

/* ── TÍTULO DEL PARTIDO ── */
.match-header { margin-bottom: 24px; }
.match-header h1 {
  font-family: 'Oswald', sans-serif;
  font-weight: 900;
  font-size: clamp(28px, 6vw, 42px);
  line-height: 1.1;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.match-header h1 .vs { color: var(--red); }
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--red);
  color: var(--white);
  padding: 4px 12px;
  border-radius: 4px;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .15em;
  margin-top: 10px;
}
.live-dot-header {
  width: 8px; height: 8px;
  background: var(--white);
  border-radius: 50%;
  animation: pulse 1.4s infinite;
}

/* ── REPRODUCTOR FALSO ── */
.fake-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 15px 35px rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 24px;
}
.player-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.4;
  transition: opacity 0.3s;
}
.fake-player:hover .player-bg { opacity: 0.25; }

.player-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  display: flex;
  justify-content: space-between;
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .05em;
}
.server-text { color: var(--white); }
.quality-text { color: #22c55e; }

/* Botón de Play Animado */
.play-btn {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  background: var(--red);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
  animation: pulse-play 1.5s infinite;
  transition: transform 0.2s;
  z-index: 2;
}
.play-btn::after {
  content: '';
  width: 0; height: 0;
  border-top: 15px solid transparent;
  border-bottom: 15px solid transparent;
  border-left: 24px solid var(--white);
  margin-left: 6px;
}
.fake-player:hover .play-btn { transform: translate(-50%, -50%) scale(1.1); }

/* Link invisible que cubre todo el reproductor */
.smartlink-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: block;
}

@keyframes pulse-play {
  0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
  70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
  100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
}
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

/* ── BOTONES DE OPCIONES (SMARTLINKS) ── */
.options-wrapper {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 30px;
}
.btn-opt {
  flex: 1;
  min-width: 200px;
  padding: 14px 20px;
  border-radius: 999px;
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  text-decoration: none;
  transition: all .25s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-1 {
  background: var(--gold);
  color: var(--black);
  box-shadow: 0 4px 15px rgba(250, 204, 21, 0.2);
}
.btn-1:hover { background: #eab308; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(250, 204, 21, 0.4); }

.btn-2 {
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(255,255,255,.15);
  color: var(--white);
}
.btn-2:hover { background: rgba(255,255,255,0.1); border-color: var(--white); transform: translateY(-3px); }

/* ── AD SLOTS ESPACIOS ── */
.ad-slot {
  margin: 20px auto;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  border: 1px dashed rgba(255,255,255,0.1);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 60px;
}

/* ── FOOTER ── */
footer {

  z-index: 10;

  border-top: 1px solid rgba(255,255,255,.07);
  color: rgba(255,255,255,.3);
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-top: 40px;
}
</style>
